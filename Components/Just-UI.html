<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dani Digital Pro — Revenue Growth Architect</title>
<meta name="description" content="PPC & Paid Ads Growth Expert. Scaling brands with data-driven paid advertising & growth systems." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
/* ============================================================
   RESET & VARIABLES
============================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

:root {
  --bg: #080808;
  --bg2: #0d0d0d;
  --bg3: #111111;
  --surface: #161616;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --white: #ffffff;
  --off: #f0ece4;
  --muted: #6b6b6b;
  --muted2: #999;
  --gold: #c9a84c;
  --gold2: #e8c96d;
  --gold-dim: rgba(201,168,76,0.08);
  --gold-border: rgba(201,168,76,0.2);
  --gold-glow: rgba(201,168,76,0.15);
  --red: #e05c4b;
  --green: #4ade80;
  --r: 16px;
  --r2: 24px;
}

body {
  background: var(--bg);
  color: var(--white);
  font-family: 'DM Sans', sans-serif;
  line-height: 1.6;
  overflow-x: hidden;
  cursor: none;
}

/* ============================================================
   CUSTOM CURSOR
============================================================ */
.cursor {
  position: fixed; z-index: 9999;
  pointer-events: none;
  mix-blend-mode: difference;
}
.cursor-dot {
  width: 8px; height: 8px;
  background: var(--gold2);
  border-radius: 50%;
  position: fixed;
  transform: translate(-50%, -50%);
  transition: width 0.2s, height 0.2s, opacity 0.2s;
  z-index: 9999; pointer-events: none;
}
.cursor-ring {
  width: 40px; height: 40px;
  border: 1px solid rgba(201,168,76,0.5);
  border-radius: 50%;
  position: fixed;
  transform: translate(-50%, -50%);
  transition: all 0.12s ease;
  z-index: 9998; pointer-events: none;
}
body:hover .cursor-dot { opacity: 1; }

/* ============================================================
   SCROLLBAR
============================================================ */
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 2px; }

/* ============================================================
   NOISE OVERLAY
============================================================ */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
  opacity: 0.025;
  z-index: 9990; pointer-events: none;
}

/* ============================================================
   CANVAS (particles)
============================================================ */
#particles {
  position: fixed; inset: 0;
  z-index: 0; pointer-events: none;
  opacity: 0.4;
}

/* ============================================================
   NAV
============================================================ */
nav {
  position: fixed; top: 0; left: 0; right: 0;
  z-index: 1000;
  padding: 28px 64px;
  display: flex; align-items: center; justify-content: space-between;
  transition: all 0.4s ease;
}
nav.scrolled {
  padding: 18px 64px;
  background: rgba(8,8,8,0.94);
  backdrop-filter: blur(24px);
  border-bottom: 1px solid var(--border);
}
.nav-logo {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 1.15rem;
  letter-spacing: -0.01em;
  color: var(--off);
  text-decoration: none;
}
.nav-logo .dot { color: var(--gold); }
.nav-links {
  display: flex; gap: 40px; list-style: none;
  position: absolute; left: 50%; transform: translateX(-50%);
}
.nav-links a {
  font-family: 'Syne', sans-serif;
  font-size: 0.78rem;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted2);
  text-decoration: none;
  transition: color 0.2s;
  position: relative;
}
.nav-links a::after {
  content: '';
  position: absolute; bottom: -4px; left: 0; right: 0;
  height: 1px; background: var(--gold);
  transform: scaleX(0); transform-origin: right;
  transition: transform 0.3s ease;
}
.nav-links a:hover { color: var(--off); }
.nav-links a:hover::after { transform: scaleX(1); transform-origin: left; }
.nav-cta {
  font-family: 'Syne', sans-serif;
  font-size: 0.78rem; font-weight: 700;
  letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--bg);
  background: var(--gold);
  padding: 11px 24px; border-radius: 4px;
  text-decoration: none;
  transition: all 0.25s ease;
  position: relative; overflow: hidden;
}
.nav-cta::after {
  content: '';
  position: absolute; inset: 0;
  background: var(--gold2);
  transform: translateX(-100%);
  transition: transform 0.3s ease;
}
.nav-cta:hover::after { transform: translateX(0); }
.nav-cta span { position: relative; z-index: 1; }

/* ============================================================
   HERO
============================================================ */
#hero {
  min-height: 100vh;
  display: flex; align-items: center;
  position: relative;
  padding: 160px 64px 100px;
  overflow: hidden;
}
.hero-gradient {
  position: absolute; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse 60% 50% at 70% 40%, rgba(201,168,76,0.07) 0%, transparent 70%),
    radial-gradient(ellipse 40% 60% at 20% 80%, rgba(201,168,76,0.04) 0%, transparent 60%);
}
.hero-line-left {
  position: absolute; left: 64px; top: 0; bottom: 0;
  width: 1px; background: linear-gradient(to bottom, transparent, var(--border2) 30%, var(--border2) 70%, transparent);
  z-index: 1;
}
.hero-line-right {
  position: absolute; right: 64px; top: 0; bottom: 0;
  width: 1px; background: linear-gradient(to bottom, transparent, var(--border) 30%, var(--border) 70%, transparent);
  z-index: 1;
}
.hero-inner {
  max-width: 1200px; margin: 0 auto;
  position: relative; z-index: 2;
  display: grid; grid-template-columns: 1fr 420px;
  gap: 80px; align-items: center;
  width: 100%;
}
.hero-tag {
  display: inline-flex; align-items: center; gap: 10px;
  padding: 7px 16px;
  border: 1px solid var(--gold-border);
  border-radius: 2px;
  background: var(--gold-dim);
  margin-bottom: 36px;
}
.hero-tag-dot {
  width: 6px; height: 6px; background: var(--gold);
  border-radius: 50%;
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(201,168,76,0.6); }
  50% { box-shadow: 0 0 0 6px rgba(201,168,76,0); }
}
.hero-tag-text {
  font-family: 'Syne', sans-serif;
  font-size: 0.68rem; font-weight: 700;
  letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--gold);
}
.hero-h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(3rem, 5.5vw, 5.2rem);
  font-weight: 900;
  line-height: 1.05;
  letter-spacing: -0.02em;
  color: var(--off);
  margin-bottom: 32px;
}
.hero-h1 em {
  font-style: italic;
  color: var(--gold);
  display: block;
}
.hero-h1 .line-through-word {
  position: relative; display: inline-block;
}
.hero-sub {
  font-size: 1.05rem;
  color: var(--muted2);
  max-width: 500px;
  line-height: 1.8;
  margin-bottom: 48px;
  font-weight: 300;
}
.hero-sub strong { color: var(--off); font-weight: 500; }
.hero-actions { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
.btn-gold {
  font-family: 'Syne', sans-serif;
  font-size: 0.82rem; font-weight: 700;
  letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--bg);
  background: linear-gradient(135deg, var(--gold) 0%, var(--gold2) 100%);
  padding: 16px 36px; border-radius: 4px;
  text-decoration: none;
  transition: all 0.25s ease;
  display: inline-flex; align-items: center; gap: 10px;
  box-shadow: 0 8px 32px rgba(201,168,76,0.25);
}
.btn-gold:hover {
  transform: translateY(-2px);
  box-shadow: 0 16px 48px rgba(201,168,76,0.35);
}
.btn-outline {
  font-family: 'Syne', sans-serif;
  font-size: 0.82rem; font-weight: 600;
  letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--muted2);
  background: transparent;
  padding: 15px 32px; border-radius: 4px;
  border: 1px solid var(--border2);
  text-decoration: none;
  transition: all 0.25s ease;
}
.btn-outline:hover { color: var(--off); border-color: rgba(255,255,255,0.25); }
.hero-microcopy {
  margin-top: 24px;
  font-size: 0.78rem;
  color: var(--muted);
  display: flex; align-items: center; gap: 8px;
}
.hero-microcopy::before {
  content: '';
  display: block; width: 20px; height: 1px;
  background: var(--muted);
}

/* HERO CARD */
.hero-card {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: var(--r2);
  overflow: hidden;
  position: relative;
}
.hero-card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
}
.hero-card-photo {
  width: 100%; aspect-ratio: 4/3.2;
  background: linear-gradient(135deg, #1a1a1a 0%, #1e1c18 50%, #161410 100%);
  display: flex; align-items: center; justify-content: center;
  position: relative; overflow: hidden;
}
.hero-card-photo::after {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at 50% 30%, rgba(201,168,76,0.1) 0%, transparent 60%);
}
.photo-placeholder {
  display: flex; flex-direction: column; align-items: center; gap: 12px;
  z-index: 1;
}
.photo-icon {
  width: 72px; height: 72px; border-radius: 50%;
  border: 1px solid var(--gold-border);
  background: var(--gold-dim);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.8rem;
}
.photo-label {
  font-family: 'Syne', sans-serif;
  font-size: 0.65rem; letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--muted);
}
.hero-card-body { padding: 28px 28px 24px; }
.hero-card-status {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 20px;
}
.status-dot { width: 7px; height: 7px; background: var(--green); border-radius: 50%; }
.status-text {
  font-family: 'Syne', sans-serif;
  font-size: 0.7rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--green);
}
.hero-card-stats {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 1px; background: var(--border);
  border-radius: 8px; overflow: hidden;
}
.hero-stat {
  background: var(--bg3);
  padding: 16px 12px; text-align: center;
}
.hero-stat-num {
  font-family: 'Syne', sans-serif;
  font-size: 1.4rem; font-weight: 800;
  color: var(--gold);
  letter-spacing: -0.02em;
}
.hero-stat-lbl {
  font-size: 0.65rem; color: var(--muted);
  margin-top: 2px; line-height: 1.3;
}
.hero-card-tag {
  margin-top: 20px;
  padding: 12px 16px;
  background: var(--gold-dim);
  border: 1px solid var(--gold-border);
  border-radius: 8px;
  font-size: 0.78rem;
  color: var(--gold2);
  display: flex; align-items: center; gap: 8px;
}
.hero-card-tag::before { content: '⚡'; }

/* ============================================================
   MARQUEE
============================================================ */
.marquee-wrap {
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  padding: 20px 0;
  overflow: hidden;
  background: var(--bg2);
  position: relative; z-index: 2;
}
.marquee-track {
  display: flex; gap: 0;
  animation: marquee 28s linear infinite;
  width: max-content;
}
.marquee-item {
  display: flex; align-items: center; gap: 40px;
  padding: 0 40px;
  font-family: 'Syne', sans-serif;
  font-size: 0.72rem; font-weight: 700;
  letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--muted);
  white-space: nowrap;
}
.marquee-item span { color: var(--gold); }
.marquee-sep {
  width: 4px; height: 4px; background: var(--gold);
  border-radius: 50%; opacity: 0.5;
}
@keyframes marquee {
  from { transform: translateX(0); }
  to { transform: translateX(-50%); }
}

/* ============================================================
   METRICS BAND
============================================================ */
.metrics-band {
  padding: 100px 64px;
  position: relative; z-index: 2;
}
.metrics-band-inner { max-width: 1200px; margin: 0 auto; }
.metrics-row {
  display: grid; grid-template-columns: repeat(3, 1fr);
  position: relative;
}
.metrics-row::before {
  content: '';
  position: absolute; top: 0; bottom: 0;
  left: 33.33%; width: 1px;
  background: var(--border);
}
.metrics-row::after {
  content: '';
  position: absolute; top: 0; bottom: 0;
  left: 66.66%; width: 1px;
  background: var(--border);
}
.metric-item { padding: 0 48px; }
.metric-item:first-child { padding-left: 0; }
.metric-num {
  font-family: 'Playfair Display', serif;
  font-size: clamp(3rem, 5vw, 5rem);
  font-weight: 700;
  color: var(--off);
  line-height: 1;
  margin-bottom: 8px;
  display: flex; align-items: flex-start;
}
.metric-num .sup {
  font-family: 'Syne', sans-serif;
  font-size: 1.2rem; font-weight: 700;
  color: var(--gold);
  margin-top: 12px; margin-left: 4px;
}
.metric-desc {
  font-size: 0.9rem;
  color: var(--muted2);
  line-height: 1.6;
}
.metric-desc strong { color: var(--off); font-weight: 500; display: block; margin-bottom: 2px; }
.metric-bar {
  margin-top: 16px;
  height: 1px;
  background: var(--border);
  position: relative; overflow: hidden;
}
.metric-bar-fill {
  position: absolute; left: 0; top: 0; bottom: 0;
  background: linear-gradient(90deg, var(--gold), var(--gold2));
  animation: barFill 1.5s ease forwards;
  transform-origin: left;
  transform: scaleX(0);
}
@keyframes barFill {
  to { transform: scaleX(1); }
}

/* ============================================================
   SECTION SYSTEM
============================================================ */
.section { padding: 120px 64px; position: relative; z-index: 2; }
.section-inner { max-width: 1200px; margin: 0 auto; }
.divider-line {
  height: 1px; background: var(--border);
  max-width: 1200px; margin: 0 auto;
  position: relative; z-index: 2;
}

.label {
  font-family: 'Syne', sans-serif;
  font-size: 0.68rem; font-weight: 700;
  letter-spacing: 0.16em; text-transform: uppercase;
  color: var(--gold);
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 24px;
}
.label::before {
  content: '';
  width: 28px; height: 1px;
  background: var(--gold);
}
.section-h2 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(2.2rem, 4vw, 3.8rem);
  font-weight: 700;
  line-height: 1.1;
  letter-spacing: -0.02em;
  color: var(--off);
  margin-bottom: 20px;
}
.section-h2 em { font-style: italic; color: var(--gold); }
.section-p {
  font-size: 1rem;
  color: var(--muted2);
  max-width: 560px;
  line-height: 1.8;
  font-weight: 300;
}

/* ============================================================
   FRAMEWORK / SYSTEM
============================================================ */
.framework-grid {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 1px; background: var(--border);
  border: 1px solid var(--border);
  border-radius: var(--r2);
  overflow: hidden;
  margin-top: 64px;
}
.fw-card {
  background: var(--bg3);
  padding: 48px 40px;
  position: relative;
  transition: background 0.3s;
}
.fw-card:hover { background: #141414; }
.fw-card::after {
  content: '';
  position: absolute; top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold-border), transparent);
  transform: scaleX(0);
  transition: transform 0.4s ease;
}
.fw-card:hover::after { transform: scaleX(1); }
.fw-num {
  font-family: 'Playfair Display', serif;
  font-size: 5rem; font-weight: 900;
  color: transparent;
  -webkit-text-stroke: 1px rgba(201,168,76,0.15);
  line-height: 1; margin-bottom: 28px;
  transition: -webkit-text-stroke 0.3s;
}
.fw-card:hover .fw-num { -webkit-text-stroke-color: rgba(201,168,76,0.3); }
.fw-title {
  font-family: 'Syne', sans-serif;
  font-size: 1.1rem; font-weight: 700;
  color: var(--off); margin-bottom: 12px;
}
.fw-desc { font-size: 0.88rem; color: var(--muted2); line-height: 1.75; margin-bottom: 24px; }
.fw-list { list-style: none; }
.fw-list li {
  font-size: 0.8rem; color: var(--muted);
  padding: 7px 0;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px;
}
.fw-list li:last-child { border-bottom: none; }
.fw-list li::before {
  content: '';
  width: 4px; height: 4px; border-radius: 50%;
  background: var(--gold);
  flex-shrink: 0;
}

/* ============================================================
   SERVICES
============================================================ */
.services-grid {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 20px;
  margin-top: 64px;
}
.svc-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r2);
  padding: 40px 32px;
  position: relative; overflow: hidden;
  transition: all 0.35s ease;
}
.svc-card::before {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse 60% 50% at 50% 0%, var(--gold-glow) 0%, transparent 60%);
  opacity: 0; transition: opacity 0.35s;
}
.svc-card:hover { border-color: var(--gold-border); transform: translateY(-4px); }
.svc-card:hover::before { opacity: 1; }
.svc-icon {
  font-size: 1.8rem; margin-bottom: 24px;
  width: 52px; height: 52px;
  display: flex; align-items: center; justify-content: center;
}
.svc-title {
  font-family: 'Syne', sans-serif;
  font-size: 1rem; font-weight: 700; color: var(--off);
  margin-bottom: 12px;
}
.svc-desc { font-size: 0.85rem; color: var(--muted2); line-height: 1.75; margin-bottom: 20px; }
.svc-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.svc-tag {
  font-family: 'Syne', sans-serif;
  font-size: 0.65rem; font-weight: 600;
  letter-spacing: 0.08em;
  padding: 4px 10px; border-radius: 2px;
  background: var(--gold-dim);
  border: 1px solid var(--gold-border);
  color: var(--gold);
}

/* ============================================================
   CASE STUDIES
============================================================ */
.cases-grid {
  display: grid; grid-template-columns: repeat(2, 1fr);
  gap: 20px; margin-top: 64px;
}
.case-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r2);
  padding: 48px 44px;
  position: relative; overflow: hidden;
  transition: border-color 0.3s;
}
.case-card:hover { border-color: var(--border2); }
.case-industry {
  font-family: 'Syne', sans-serif;
  font-size: 0.65rem; font-weight: 700;
  letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 20px;
  display: flex; align-items: center; gap: 10px;
}
.case-industry::before {
  content: ''; width: 16px; height: 1px;
  background: var(--gold);
}
.case-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.3rem; font-weight: 700;
  color: var(--off); line-height: 1.35;
  margin-bottom: 32px;
}
.case-steps { list-style: none; margin-bottom: 32px; }
.case-step {
  padding: 16px 0;
  border-bottom: 1px solid var(--border);
}
.case-step:last-child { border-bottom: none; }
.cs-label {
  font-family: 'Syne', sans-serif;
  font-size: 0.62rem; font-weight: 700;
  letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--gold); margin-bottom: 6px;
}
.cs-text { font-size: 0.85rem; color: var(--muted2); line-height: 1.6; }
.case-results {
  display: flex; gap: 0;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
}
.cr-stat {
  flex: 1; padding: 20px 16px; text-align: center;
  border-right: 1px solid var(--border);
}
.cr-stat:last-child { border-right: none; }
.cr-num {
  font-family: 'Syne', sans-serif;
  font-size: 1.5rem; font-weight: 800;
  color: var(--gold); letter-spacing: -0.02em;
}
.cr-lbl { font-size: 0.65rem; color: var(--muted); margin-top: 4px; }

/* ============================================================
   ABOUT
============================================================ */
.about-grid {
  display: grid; grid-template-columns: 380px 1fr;
  gap: 80px; align-items: start;
  margin-top: 64px;
}
.about-visual {
  position: relative;
}
.about-photo {
  width: 100%;
  aspect-ratio: 3/4;
  background: linear-gradient(145deg, #1a1814 0%, #161412 100%);
  border: 1px solid var(--border2);
  border-radius: var(--r2);
  display: flex; align-items: center; justify-content: center;
  position: relative; overflow: hidden;
}
.about-photo::before {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at 50% 20%, rgba(201,168,76,0.1) 0%, transparent 60%);
}
.about-photo-inner { text-align: center; z-index: 1; }
.about-photo-icon { font-size: 3rem; opacity: 0.15; margin-bottom: 8px; }
.about-photo-lbl {
  font-family: 'Syne', sans-serif;
  font-size: 0.62rem; letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--muted); opacity: 0.4;
}
.about-geo {
  position: absolute; bottom: 28px; left: 50%; transform: translateX(-50%);
  background: rgba(8,8,8,0.9);
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 12px 20px;
  display: flex; align-items: center; gap: 10px;
  white-space: nowrap;
}
.geo-flag { font-size: 1rem; }
.geo-text-main {
  font-family: 'Syne', sans-serif;
  font-size: 0.75rem; font-weight: 600; color: var(--off);
}
.geo-text-sub { font-size: 0.65rem; color: var(--muted); }
.about-floater {
  position: absolute; top: -20px; right: -20px;
  background: var(--bg3); border: 1px solid var(--gold-border);
  border-radius: 12px; padding: 16px 20px;
}
.floater-num {
  font-family: 'Syne', sans-serif;
  font-size: 1.4rem; font-weight: 800; color: var(--gold);
}
.floater-lbl { font-size: 0.65rem; color: var(--muted); }
.about-content { padding-top: 8px; }
.about-p {
  font-size: 0.95rem; color: var(--muted2);
  line-height: 1.85; margin-bottom: 20px;
  font-weight: 300;
}
.about-p strong { color: var(--off); font-weight: 500; }
.about-list { list-style: none; margin-top: 36px; }
.about-list li {
  display: flex; align-items: flex-start; gap: 16px;
  padding: 16px 0;
  border-bottom: 1px solid var(--border);
}
.about-list li:first-child { border-top: 1px solid var(--border); }
.about-li-icon {
  width: 32px; height: 32px; flex-shrink: 0;
  background: var(--gold-dim); border: 1px solid var(--gold-border);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.85rem; margin-top: 2px;
}
.about-li-text { font-size: 0.875rem; color: var(--muted2); line-height: 1.6; }
.about-li-text strong { color: var(--off); font-weight: 500; display: block; margin-bottom: 2px; }

/* ============================================================
   TESTIMONIALS
============================================================ */
.testi-grid {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 20px; margin-top: 64px;
}
.testi-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r2);
  padding: 36px 32px;
  transition: all 0.3s ease;
  position: relative;
}
.testi-card:hover { border-color: var(--border2); transform: translateY(-3px); }
.testi-quote {
  font-size: 2.5rem; color: var(--gold);
  line-height: 1; margin-bottom: 16px;
  opacity: 0.4;
  font-family: 'Playfair Display', serif;
}
.testi-text {
  font-size: 0.9rem; color: var(--muted2);
  line-height: 1.8; margin-bottom: 28px;
  font-style: italic; font-weight: 300;
}
.testi-author { display: flex; align-items: center; gap: 14px; }
.testi-av {
  width: 40px; height: 40px; border-radius: 50%;
  background: var(--gold-dim); border: 1px solid var(--gold-border);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Syne', sans-serif;
  font-size: 0.85rem; font-weight: 700; color: var(--gold);
  flex-shrink: 0;
}
.testi-name {
  font-family: 'Syne', sans-serif;
  font-size: 0.85rem; font-weight: 700; color: var(--off);
}
.testi-role { font-size: 0.75rem; color: var(--muted); }
.stars { color: var(--gold); font-size: 0.75rem; letter-spacing: 2px; margin-bottom: 16px; }

/* ============================================================
   OFFER
============================================================ */
.offer-wrap {
  margin-top: 64px;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: var(--r2);
  overflow: hidden;
  position: relative;
}
.offer-wrap::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent 0%, var(--gold) 30%, var(--gold2) 70%, transparent 100%);
}
.offer-inner {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 0;
}
.offer-left {
  padding: 60px 56px;
  border-right: 1px solid var(--border);
}
.offer-badge {
  display: inline-flex; align-items: center; gap: 8px;
  background: rgba(224,92,75,0.1); border: 1px solid rgba(224,92,75,0.25);
  border-radius: 2px; padding: 5px 12px;
  font-family: 'Syne', sans-serif;
  font-size: 0.65rem; font-weight: 700;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--red); margin-bottom: 24px;
}
.offer-h3 {
  font-family: 'Playfair Display', serif;
  font-size: 2rem; font-weight: 700;
  color: var(--off); line-height: 1.2;
  margin-bottom: 16px;
}
.offer-p { font-size: 0.9rem; color: var(--muted2); line-height: 1.75; margin-bottom: 36px; font-weight: 300; }
.offer-note { font-size: 0.75rem; color: var(--muted); margin-top: 12px; }
.offer-right { padding: 60px 56px; }
.offer-list { list-style: none; }
.offer-list li {
  display: flex; align-items: center; gap: 14px;
  padding: 14px 0;
  border-bottom: 1px solid var(--border);
  font-size: 0.875rem; color: var(--muted2);
}
.offer-list li:first-child { border-top: 1px solid var(--border); }
.check {
  width: 20px; height: 20px; flex-shrink: 0;
  background: rgba(74,222,128,0.08); border: 1px solid rgba(74,222,128,0.2);
  border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.65rem; color: var(--green);
}

/* ============================================================
   INSIGHTS
============================================================ */
.insights-grid {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 20px; margin-top: 64px;
}
.insight-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r2);
  padding: 36px 32px;
  cursor: pointer;
  transition: all 0.3s ease;
  position: relative; overflow: hidden;
}
.insight-card::after {
  content: '→';
  position: absolute; bottom: 28px; right: 28px;
  color: var(--gold); font-size: 1rem;
  opacity: 0; transform: translateX(-8px);
  transition: all 0.3s ease;
}
.insight-card:hover { border-color: var(--border2); transform: translateY(-4px); }
.insight-card:hover::after { opacity: 1; transform: translateX(0); }
.insight-cat {
  font-family: 'Syne', sans-serif;
  font-size: 0.65rem; font-weight: 700;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--gold); margin-bottom: 16px;
}
.insight-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.05rem; font-weight: 700;
  color: var(--off); line-height: 1.4;
  margin-bottom: 12px;
}
.insight-desc { font-size: 0.82rem; color: var(--muted2); line-height: 1.7; font-weight: 300; }

/* ============================================================
   CTA SECTION
============================================================ */
.cta-section {
  padding: 140px 64px;
  position: relative; z-index: 2;
  text-align: center;
  overflow: hidden;
}
.cta-bg {
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 50% 50%, rgba(201,168,76,0.06) 0%, transparent 70%);
}
.cta-lines {
  position: absolute; inset: 0;
  background-image:
    linear-gradient(var(--border) 1px, transparent 1px),
    linear-gradient(90deg, var(--border) 1px, transparent 1px);
  background-size: 80px 80px;
  opacity: 0.3;
}
.cta-inner { position: relative; z-index: 1; max-width: 800px; margin: 0 auto; }
.cta-eyebrow {
  font-family: 'Syne', sans-serif;
  font-size: 0.7rem; font-weight: 700;
  letter-spacing: 0.16em; text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 28px;
  display: flex; align-items: center; justify-content: center; gap: 14px;
}
.cta-eyebrow::before,
.cta-eyebrow::after { content: ''; width: 40px; height: 1px; background: var(--gold); }
.cta-h2 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(2.5rem, 5vw, 4.5rem);
  font-weight: 900; line-height: 1.08;
  letter-spacing: -0.02em;
  color: var(--off); margin-bottom: 24px;
}
.cta-h2 em { font-style: italic; color: var(--gold); }
.cta-p {
  font-size: 1rem; color: var(--muted2); margin-bottom: 48px;
  line-height: 1.8; font-weight: 300;
}
.cta-contact {
  margin-top: 24px;
  font-size: 0.82rem; color: var(--muted);
  display: flex; align-items: center; justify-content: center; gap: 20px;
}
.cta-contact a {
  color: var(--muted2); text-decoration: none;
  transition: color 0.2s;
}
.cta-contact a:hover { color: var(--gold); }

/* ============================================================
   FOOTER
============================================================ */
footer {
  border-top: 1px solid var(--border);
  padding: 48px 64px;
  position: relative; z-index: 2;
}
.footer-inner {
  max-width: 1200px; margin: 0 auto;
  display: flex; align-items: center; justify-content: space-between;
}
.footer-logo {
  font-family: 'Syne', sans-serif;
  font-weight: 800; font-size: 1rem;
  color: var(--off); text-decoration: none;
}
.footer-logo .dot { color: var(--gold); }
.footer-links { display: flex; gap: 32px; }
.footer-links a {
  font-family: 'Syne', sans-serif;
  font-size: 0.72rem; font-weight: 600;
  letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--muted); text-decoration: none;
  transition: color 0.2s;
}
.footer-links a:hover { color: var(--off); }
.footer-copy {
  font-size: 0.72rem; color: #333;
  font-family: 'Syne', sans-serif;
  letter-spacing: 0.04em;
}

/* ============================================================
   SCROLL REVEAL
============================================================ */
.reveal {
  opacity: 0;
  transform: translateY(32px);
  transition: opacity 0.8s ease, transform 0.8s ease;
}
.reveal.in-view {
  opacity: 1;
  transform: translateY(0);
}
.reveal-delay-1 { transition-delay: 0.1s; }
.reveal-delay-2 { transition-delay: 0.2s; }
.reveal-delay-3 { transition-delay: 0.3s; }
.reveal-delay-4 { transition-delay: 0.4s; }

/* ============================================================
   RESPONSIVE
============================================================ */
@media (max-width: 1024px) {
  nav { padding: 20px 32px; }
  nav.scrolled { padding: 14px 32px; }
  .nav-links { display: none; }
  #hero, .section, .metrics-band, .cta-section { padding-left: 32px; padding-right: 32px; }
  .hero-inner { grid-template-columns: 1fr; gap: 48px; }
  .hero-card { display: none; }
  .metrics-row { grid-template-columns: 1fr; gap: 48px; }
  .metrics-row::before, .metrics-row::after { display: none; }
  .metric-item { padding: 0; padding-bottom: 48px; border-bottom: 1px solid var(--border); }
  .metric-item:last-child { border-bottom: none; padding-bottom: 0; }
  .framework-grid { grid-template-columns: 1fr; }
  .services-grid { grid-template-columns: 1fr; }
  .cases-grid { grid-template-columns: 1fr; }
  .about-grid { grid-template-columns: 1fr; }
  .about-visual { display: none; }
  .testi-grid { grid-template-columns: 1fr; }
  .offer-inner { grid-template-columns: 1fr; }
  .offer-left { border-right: none; border-bottom: 1px solid var(--border); padding: 40px 32px; }
  .offer-right { padding: 40px 32px; }
  .insights-grid { grid-template-columns: 1fr; }
  footer { padding: 40px 32px; }
  .footer-inner { flex-direction: column; gap: 24px; text-align: center; }
  .footer-links { flex-wrap: wrap; justify-content: center; }
  .marquee-wrap { overflow: hidden; }
}
</style>
</head>
<body>

<!-- Cursor -->
<div class="cursor-dot" id="cursorDot"></div>
<div class="cursor-ring" id="cursorRing"></div>

<!-- Particles Canvas -->
<canvas id="particles"></canvas>

<!-- ============================================================
     NAV
============================================================ -->
<nav id="navbar">
  <a href="#" class="nav-logo">Dani Digital Pro</a>
  <ul class="nav-links">
    <li><a href="#services">Services</a></li>
    <li><a href="#framework">System</a></li>
    <li><a href="#results">Results</a></li>
    <li><a href="#about">About</a></li>
    <li><a href="#insights">Insights</a></li>
  </ul>
  <a href="#apply" class="nav-cta"><span>Book Strategy Call</span></a>
</nav>


<!-- ============================================================
     FOOTER
============================================================ -->
<footer>
  <div class="footer-inner" style="margin-top: 50rem !important;">
    <a href="#" class="footer-logo">Dani Digital Pro</a>
    <div class="footer-links">
      <a href="#services">Services</a>
      <a href="#results">Results</a>
      <a href="#about">About</a>
      <a href="#insights">Insights</a>
      <a href="#apply">Contact</a>
    </div>
    <div class="footer-copy">© 2025 Dani Digital Pro. Lahore, Pakistan.</div>
  </div>
</footer>

<script>
/* ============================================================
   CURSOR
============================================================ */
const dot = document.getElementById('cursorDot');
const ring = document.getElementById('cursorRing');
let mx = 0, my = 0, rx = 0, ry = 0;

document.addEventListener('mousemove', e => {
  mx = e.clientX; my = e.clientY;
  dot.style.left = mx + 'px';
  dot.style.top = my + 'px';
});

function animateRing() {
  rx += (mx - rx) * 0.12;
  ry += (my - ry) * 0.12;
  ring.style.left = rx + 'px';
  ring.style.top = ry + 'px';
  requestAnimationFrame(animateRing);
}
animateRing();

document.querySelectorAll('a, button, .svc-card, .insight-card, .testi-card').forEach(el => {
  el.addEventListener('mouseenter', () => {
    dot.style.width = '12px';
    dot.style.height = '12px';
    ring.style.width = '60px';
    ring.style.height = '60px';
    ring.style.borderColor = 'rgba(201,168,76,0.8)';
  });
  el.addEventListener('mouseleave', () => {
    dot.style.width = '8px';
    dot.style.height = '8px';
    ring.style.width = '40px';
    ring.style.height = '40px';
    ring.style.borderColor = 'rgba(201,168,76,0.5)';
  });
});

/* ============================================================
   NAVBAR SCROLL
============================================================ */
const navbar = document.getElementById('navbar');
window.addEventListener('scroll', () => {
  navbar.classList.toggle('scrolled', window.scrollY > 40);
});

/* ============================================================
   PARTICLES
============================================================ */
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
let W, H, particles = [];

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

for (let i = 0; i < 60; i++) {
  particles.push({
    x: Math.random() * window.innerWidth,
    y: Math.random() * window.innerHeight,
    r: Math.random() * 1.5 + 0.3,
    dx: (Math.random() - 0.5) * 0.3,
    dy: (Math.random() - 0.5) * 0.3,
    o: Math.random() * 0.5 + 0.1,
  });
}

function drawParticles() {
  ctx.clearRect(0, 0, W, H);
  particles.forEach(p => {
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(201,168,76,${p.o})`;
    ctx.fill();
    p.x += p.dx; p.y += p.dy;
    if (p.x < 0) p.x = W;
    if (p.x > W) p.x = 0;
    if (p.y < 0) p.y = H;
    if (p.y > H) p.y = 0;
  });
  requestAnimationFrame(drawParticles);
}
drawParticles();

/* ============================================================
   SCROLL REVEAL
============================================================ */
const revealEls = document.querySelectorAll('.reveal');
const revObs = new IntersectionObserver((entries) => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      e.target.classList.add('in-view');
    }
  });
}, { threshold: 0.08 });
revealEls.forEach(el => revObs.observe(el));

/* ============================================================
   COUNTER ANIMATION
============================================================ */
const counters = document.querySelectorAll('.metric-num[data-count]');
const cntObs = new IntersectionObserver((entries) => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      const el = e.target;
      const target = parseInt(el.getAttribute('data-count'));
      const sup = el.querySelector('.sup');
      let current = 0;
      const step = target / 40;
      const t = setInterval(() => {
        current += step;
        if (current >= target) {
          current = target;
          clearInterval(t);
        }
        el.innerHTML = Math.floor(current) + (sup ? sup.outerHTML : '');
      }, 40);
      cntObs.unobserve(el);
    }
  });
}, { threshold: 0.3 });
counters.forEach(el => cntObs.observe(el));

/* ============================================================
   METRIC BAR ANIMATION
============================================================ */
const bars = document.querySelectorAll('.metric-bar-fill');
const barObs = new IntersectionObserver((entries) => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      e.target.style.animation = 'barFill 1.5s ease forwards';
    }
  });
}, { threshold: 0.3 });
bars.forEach(b => barObs.observe(b));

/* ============================================================
   SMOOTH ANCHOR LINKS
============================================================ */
document.querySelectorAll('a[href^="#"]').forEach(a => {
  a.addEventListener('click', e => {
    const id = a.getAttribute('href');
    if (id === '#') return;
    const target = document.querySelector(id);
    if (target) {
      e.preventDefault();
      target.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
  });
});
</script>
</body>
</html>
